services:
  jtl-workflow:
    image: abdullahibdah/jtl-workflow-creator:latest   # update with your Docker Hub username
    # build:                   # uncomment to build locally instead of pulling
    #   context: .
    #   dockerfile: Dockerfile.selfhost
    ports:
      - "3001:3001"
    environment:
      # ── Required ──────────────────────────────────────────────────────────
      # URL of the community hub (hosted by the developer).
      # Remove or leave empty to hide the Community tab.
      HUB_URL: "https://hub.yourdomain.com"

      # ── Optional ──────────────────────────────────────────────────────────
      # PORT: 3001               # internal listen port (change EXPOSE too)

      # MSSQL credentials are NOT set here — users enter them in the
      # Settings panel inside the UI. They are stored encrypted in the
      # browser's localStorage and never touch this server's env.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
